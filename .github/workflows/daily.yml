name: Daily AI Digest

on:
  schedule:
    - cron: "0 11 * * *"  # 07:00 America/New_York (EDT) — adjust for your timezone
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Generate digest and archive
        run: python main.py generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}

      - name: Commit archived digest
        run: |
          git config user.name "newsagent-bot"
          git config user.email "noreply@github.com"
          git add digests/
          if git diff --cached --quiet; then
            echo "No new digest to commit"
          else
            git commit -m "Digest $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      - name: Wait for Pages to update
        run: sleep 45

      - name: Send to Slack
        run: python main.py send
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
